<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kookplanner Ricour</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#E07A5F">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           SMAKELIJK & MODERN KOOK-THEMA 🧑‍🍳🌿
           ========================================= */
        :root { 
            --primary: #E07A5F;        /* Warme Terracotta (Paprika) */
            --primary-light: #F4A261;  /* Zacht Oranje (Perzik/Kruiden) */
            --secondary: #81B29A;      /* Saliegroen (Koriander/Munt) */
            --bg-color: #FDF8F5;       /* Warme Crème achtergrond */
            --card-bg: #FFFFFF;        /* Witte kaarten voor contrast */
            --text-main: #3D405B;      /* Diep marine/leisteen (zachter dan zwart) */
            --text-muted: #8A8D91;     /* Subtiel grijs voor details */
            --border-color: #F0E6DF;   /* Zachte randen */
            --shadow-soft: 0 12px 35px rgba(61, 64, 91, 0.05);
            --shadow-hover: 0 18px 45px rgba(61, 64, 91, 0.1);
        }
        
        /* =========================================
           BASIS STIJLEN
           ========================================= */
        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 15px; 
            padding-top: max(25px, env(safe-area-inset-top)); 
            min-height: 100vh;
        }
        
        .container { max-width: 1200px; margin: 0 auto; padding-bottom: 60px; }

        /* App Header */
        .app-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .app-header h1 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-main);
            margin: 0 0 5px 0;
            letter-spacing: -0.5px;
        }
        .app-header p {
            color: var(--primary);
            font-weight: 600;
            margin: 0;
            font-size: 1.1rem;
        }
        
        /* =========================================
           NAVIGATIE & CONTROLES
           ========================================= */
        .controls-bar { 
            display: flex; flex-direction: column; gap: 20px; align-items: center; 
            background: var(--card-bg);
            padding: 20px 25px; border-radius: 24px; margin-bottom: 25px; 
            box-shadow: var(--shadow-soft); border: 1px solid var(--border-color);
        }
        
        .nav-tabs { display: flex; gap: 12px; justify-content: center; width: 100%; flex-wrap: wrap; }
        
        .tab-btn { 
            padding: 12px 28px; border-radius: 100px; border: none; cursor: pointer; 
            background: #F4EBE6; color: var(--text-muted); font-weight: 600; font-size: 0.95rem;
        }
        .tab-btn:hover { background: #EADCD4; color: var(--text-main); }
        .tab-btn.active { 
            background: var(--primary); color: white; 
            box-shadow: 0 8px 20px rgba(224, 122, 95, 0.3); transform: translateY(-2px);
        }

        .dropdown-row {
            display: flex; gap: 15px; align-items: center; flex-wrap: wrap; justify-content: center;
            width: 100%; border-top: 1px dashed var(--border-color); padding-top: 20px;
        }

        select { 
            padding: 12px 24px; border-radius: 16px; border: 2px solid #F0E6DF; 
            background: #FAFAFA; color: var(--text-main); font-weight: 600; font-size: 1rem; 
            outline: none; cursor: pointer;
        }
        select:focus { border-color: var(--primary-light); background: white; }
        
        .reset-btn {
            border: none; background: #FFF0F0; color: #E63946; padding: 12px 24px; 
            border-radius: 16px; cursor: pointer; font-weight: 600; font-size: 0.95rem;
        }
        .reset-btn:hover { background: #FFE0E0; transform: scale(1.03); }

        /* =========================================
           PRIJS & TOTAAL BANNER
           ========================================= */
        .total-box { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); 
            color: white; padding: 18px; 
            border-radius: 20px; text-align: center; margin-bottom: 35px; 
            font-weight: 700; font-size: 1.3rem; letter-spacing: 0.5px;
            box-shadow: 0 10px 25px rgba(224, 122, 95, 0.2);
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        
        /* =========================================
           BOODSCHAPPENLIJST
           ========================================= */
        .shopping-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-bottom: 45px; }
        
        .shop-card { 
            background: var(--card-bg); padding: 25px; border-radius: 24px; 
            box-shadow: var(--shadow-soft); border: 1px solid var(--border-color);
        }
        .shop-card h3 { 
            margin-top: 0; font-size: 1.25rem; font-weight: 700; color: var(--text-main);
            border-bottom: 2px solid #F4EBE6; padding-bottom: 15px; margin-bottom: 15px; 
            display: flex; align-items: center; gap: 10px;
        }
        
        .item-list { list-style: none; padding: 0; margin: 0; }
        .item-list li { 
            display: flex; justify-content: space-between; align-items: center; padding: 14px 0; 
            border-bottom: 1px dashed var(--border-color); font-size: 0.95rem; cursor: pointer; font-weight: 500;
        }
        .item-list li:last-child { border-bottom: none; }
        
        .stock-check { 
            width: 24px; height: 24px; border: 2px solid #D5CACA; border-radius: 8px; 
            margin-right: 15px; display: inline-flex; justify-content: center; align-items: center;
            background: #FAFAFA; flex-shrink: 0; transition: 0.2s;
        }
        
        .item-list li:hover .stock-check { border-color: var(--secondary); }
        
        .item-list li.stocked { color: #BDBDBD; text-decoration: line-through; }
        .item-list li.stocked .stock-check { 
            background: var(--secondary); border-color: var(--secondary); transform: scale(1.1);
        }
        .item-list li.stocked .stock-check::after { 
            content: '✓'; color: #fff; font-size: 14px; font-weight: 800;
        }

        /* =========================================
           RECEPTEN KAARTEN (KALENDER)
           ========================================= */
        .calendar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        
        .day-card { 
            background: var(--card-bg); padding: 25px; border-radius: 24px; cursor: pointer; 
            position: relative; overflow: hidden; border: 1px solid var(--border-color);
            box-shadow: var(--shadow-soft); display: flex; flex-direction: column;
        }
        .day-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); border-color: var(--primary-light); }

        .day-card h3 { color: var(--text-main); margin: 5px 0 15px 0; font-size: 1.15rem; font-weight: 700; padding-right: 50px; line-height: 1.4; }
        
        .stat-bar { display: flex; flex-wrap: wrap; gap: 10px; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 20px; font-weight: 600; }
        .stat-bar span { background: #F8F9FA; border: 1px solid #E9ECEF; padding: 6px 12px; border-radius: 8px; display: flex; align-items: center; gap: 5px;}
        
        .mini-ing-box { 
            background: #FDF8F5; border: 1px solid #F0E6DF; padding: 15px; border-radius: 12px; 
            font-size: 0.85rem; color: var(--text-main); flex-grow: 1; line-height: 1.6;
        }

        /* Check Button op de Recept Kaart */
        .check-btn { 
            position: absolute; top: 20px; right: 20px; width: 42px; height: 42px; 
            border-radius: 12px; background: #F4EBE6; border: none; cursor: pointer; color: transparent;
            z-index: 20; font-size: 1.3rem; display:flex; align-items:center; justify-content:center;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .check-btn:hover { background: #EADCD4; transform: scale(1.1); }
        .day-card.completed .check-btn { background: var(--secondary); color: #fff; box-shadow: 0 4px 15px rgba(129, 178, 154, 0.3); }

        /* COMPLETED STATE & ANIMATION */
        @keyframes scrollText {
            0% { transform: translate(0, -50%); }
            100% { transform: translate(-50%, -50%); }
        }

        .day-card.completed { border: 1px solid rgba(129, 178, 154, 0.3); }
        .day-card.completed > *:not(.check-btn) { opacity: 0.4; filter: grayscale(80%); }

        .day-card.completed::before {
            content: "SMAKELIJK! 🌿 SMAKELIJK! 🌿 SMAKELIJK! 🌿 SMAKELIJK!";
            position: absolute; top: 50%; left: 0; width: 300%; transform: translateY(-50%);
            background: rgba(129, 178, 154, 0.95); color: #fff; font-weight: 700; font-size: 1.3rem; letter-spacing: 1px;
            padding: 18px 0; white-space: nowrap; animation: scrollText 10s linear infinite;
            z-index: 10; display: flex; align-items: center; box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        /* =========================================
           MODAL (POPUP RECEPT)
           ========================================= */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(61, 64, 91, 0.4); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); }
        
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .modal-content { 
            background: white; margin: 5% auto; padding: 40px; width: 92%; max-width: 700px; 
            border-radius: 32px; position: relative; max-height: 85vh; overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(61, 64, 91, 0.3); animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .close { 
            position: absolute; right: 25px; top: 25px; width: 40px; height: 40px; 
            background: #F4EBE6; border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 24px; cursor: pointer; color: var(--text-main); font-weight: 300;
        }
        .close:hover { background: #EADCD4; color: var(--primary); }

        .modal-content h2 { margin-top: 0; font-size: 1.8rem; font-weight: 800; color: var(--primary); padding-right: 50px; line-height: 1.3; }
        
        #mStats { display:flex; flex-wrap: wrap; gap:12px; margin-bottom:30px; border-bottom: 2px dashed #F0E6DF; padding-bottom: 20px; }
        #mStats span { background: #F8F9FA; border: 1px solid #E9ECEF; padding: 8px 16px; border-radius: 12px; font-size: 0.9rem; font-weight: 600; color: var(--text-muted); }
        
        .modal-content h4 { font-size: 1.2rem; margin-top: 30px; margin-bottom: 15px; color: var(--text-main); font-weight: 700; display: flex; align-items: center; gap: 8px; }
        
        #mIng { padding-left: 20px; line-height: 1.8; color: var(--text-main); font-size: 1.05rem; font-weight: 500; }
        
        #mSteps { counter-reset: step-counter; }
        #mSteps p { 
            background: #FDF8F5; padding: 18px 20px 18px 50px; border-radius: 16px; margin-bottom: 15px; 
            color: var(--text-main); line-height: 1.6; font-size: 0.95rem; position: relative; border: 1px solid #F0E6DF;
        }
        #mSteps p::before {
            counter-increment: step-counter; content: counter(step-counter);
            position: absolute; left: 15px; top: 18px; background: var(--primary-light); color: white;
            width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.8rem;
        }
        
        #mKid { 
            background: #F2F7F4; border-left: 4px solid var(--secondary); padding: 20px; 
            border-radius: 0 16px 16px 0; margin-top: 35px; color: #2D4A3E; font-weight: 500; line-height: 1.6; 
        }

        .modal-content::-webkit-scrollbar { width: 6px; }
        .modal-content::-webkit-scrollbar-track { background: transparent; }
        .modal-content::-webkit-scrollbar-thumb { background: #DCDCDC; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    
    <div class="app-header">
        <h1>👩‍🍳 Kookplanner</h1>
        <p>Familie Ricour</p>
    </div>

    <div class="controls-bar">
        <div class="nav-tabs">
            <button id="w12Btn" class="tab-btn active" onclick="setPeriode('w1&2')">Week 1 & 2</button>
            <button id="w34Btn" class="tab-btn" onclick="setPeriode('w3&4')">Week 3 & 4</button>
        </div>

        <div class="dropdown-row">
            <select id="monthSelect" onchange="loadNewData()">
                <option value="januari">Januari</option>
                <option value="februari">Februari</option>
                <option value="maart">Maart</option>
                <option value="april">April</option>
            </select>
            <button class="reset-btn" onclick="clearProgress()">↻ Reset Vinkjes</button>
        </div>
    </div>

    <div id="priceBanner" class="total-box">Laden...</div>

    <div class="shopping-grid">
        <div class="shop-card"><h3>🥩 Vlees & Vis</h3><ul id="vList" class="item-list"></ul></div>
        <div class="shop-card"><h3>🥦 Groenten</h3><ul id="gList" class="item-list"></ul></div>
        <div class="shop-card"><h3>🥫 Voorraadkast</h3><ul id="kList" class="item-list"></ul></div>
    </div>

    <div id="calendar" class="calendar-grid"></div>
</div>

<div id="receptModal" class="modal">
    <div class="modal-content">
        <div class="close" onclick="closeModal()">✕</div>
        <h2 id="mTitle"></h2>
        <div id="mStats"></div>
        <h4>🛒 Boodschappenlijst</h4>
        <ul id="mIng"></ul>
        <h4>👩‍🍳 Bereidingswijze</h4>
        <div id="mSteps"></div>
        <div id="mKid"></div>
    </div>
</div>

<script>
    let currentPeriode = 'w1&2';
    const currentFamilyKey = 'ricour'; // Hardcoded: Geen andere gezinnen meer nodig!
    
    let completedRecipes = JSON.parse(localStorage.getItem('completedRecipes')) || [];
    let stockedItems = JSON.parse(localStorage.getItem('stockedItems')) || [];

    function initSmartDate() {
        const today = new Date();
        const month = today.getMonth(); // 0=Jan, 1=Feb, 2=Mrt, 3=Apr
        const day = today.getDate();

        const monthSelect = document.getElementById('monthSelect');
        if (month === 0) monthSelect.value = "januari";
        else if (month === 1) monthSelect.value = "februari";
        else if (month === 2) monthSelect.value = "maart";
        else if (month === 3) monthSelect.value = "april";
        
        if (day > 15) {
            currentPeriode = 'w3&4';
        } else {
            currentPeriode = 'w1&2';
        }

        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if(currentPeriode === 'w1&2') document.getElementById('w12Btn').classList.add('active');
        else document.getElementById('w34Btn').classList.add('active');

        loadNewData();
    }

    function loadNewData() {
        const maand = document.getElementById('monthSelect').value;
        const banner = document.getElementById('priceBanner');
        banner.innerHTML = "Bezig met laden... 🍳";
        
        const oldScript = document.getElementById('data-script');
        if (oldScript) oldScript.remove();

        const script = document.createElement('script');
        script.id = 'data-script';
        script.src = `${maand}/recepten_${currentPeriode}.js?t=${new Date().getTime()}`;
        
        script.onload = () => {
            if (typeof shoppingData === 'undefined') {
                banner.innerText = "Data niet gevonden voor deze maand.";
                banner.style.background = "#E63946";
            } else {
                updateUI();
            }
        };
        
        script.onerror = () => {
            banner.innerText = `Recepten voor ${maand} nog niet beschikbaar.`;
            banner.style.background = "#E63946";
        };
        
        document.head.appendChild(script);
    }

    function setPeriode(p) {
        currentPeriode = p;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(p === 'w1&2' ? 'w12Btn' : 'w34Btn').classList.add('active');
        loadNewData();
    }

    function toggleRecipe(id, event) {
        event.stopPropagation();
        if (completedRecipes.includes(id)) {
            completedRecipes = completedRecipes.filter(rid => rid !== id);
        } else {
            completedRecipes.push(id);
        }
        localStorage.setItem('completedRecipes', JSON.stringify(completedRecipes));
        updateUI();
    }

    function toggleStock(itemName) {
        if (stockedItems.includes(itemName)) {
            stockedItems = stockedItems.filter(i => i !== itemName);
        } else {
            stockedItems.push(itemName);
        }
        localStorage.setItem('stockedItems', JSON.stringify(stockedItems));
        updateUI();
    }

    function clearProgress() {
        if(confirm("Weet je zeker dat je alle vinkjes en gekookte maaltijden wilt resetten?")) {
            completedRecipes = []; stockedItems = [];
            localStorage.removeItem('completedRecipes'); localStorage.removeItem('stockedItems');
            updateUI();
        }
    }

    function updateUI() {
        try {
            if (typeof shoppingData === 'undefined' || typeof recipeData === 'undefined') return;

            const currentShopData = shoppingData[currentFamilyKey];

            let totalCost = 0;
            const renderShopList = (id, list) => {
                const el = document.getElementById(id); el.innerHTML = '';
                if(!list) return;

                list.forEach(itemStr => {
                    const parts = itemStr.split(' - €');
                    const name = parts[0];
                    const price = parts[1] ? parseFloat(parts[1]) : 0;
                    const isStocked = stockedItems.includes(name);
                    
                    if (!isStocked) totalCost += price;

                    const li = document.createElement('li');
                    li.className = isStocked ? 'stocked' : '';
                    li.onclick = () => toggleStock(name);
                    li.innerHTML = `<div style="display:flex; align-items:center;"><span class="stock-check"></span>${name}</div><b>${price > 0 ? '€ '+price.toFixed(2).replace('.', ',') : ''}</b>`;
                    el.appendChild(li);
                });
            };

            renderShopList('vList', currentShopData.v);
            renderShopList('gList', currentShopData.g);
            renderShopList('kList', currentShopData.k);
            
            const banner = document.getElementById('priceBanner');
            banner.style.background = ''; // Reset error color if any
            banner.innerHTML = `🛒 Te Betalen: € ${totalCost.toFixed(2).replace('.', ',')}`;

            const grid = document.getElementById('calendar'); grid.innerHTML = '';
            recipeData.recipes.forEach(x => {
                const safeId = x.id || Math.random().toString(36).substr(2, 9);
                const isDone = completedRecipes.includes(safeId);
                
                const card = document.createElement('div');
                card.className = `day-card ${isDone ? 'completed' : ''}`;
                
                // Haal hoeveelheden weg voor de mini-preview
                const ingPreview = x.ing ? x.ing.map(i => i.replace(/^[\d.,]+(g|ml|l|kg|stuks|st|pak|blik|el|tl)?\s*/i, '')).slice(0, 3).join(', ') : '';

                card.innerHTML = `
                    <button class="check-btn" onclick="toggleRecipe('${safeId}', event)">✓</button>
                    <h3>${x.m}</h3>
                    <div class="stat-bar"><span>🔥 ${x.kcal} kcal</span><span>💪 ${x.p}g eiwit</span><span>🕒 ${x.t} min</span></div>
                    <div class="mini-ing-box">🛒 ${ingPreview}...</div>
                `;
                card.onclick = () => showModal(x);
                grid.appendChild(card);
            });

        } catch (error) {
            console.error(error);
        }
    }

    function showModal(x) {
        document.getElementById('mTitle').innerText = x.m;
        document.getElementById('mStats').innerHTML = `<span>🔥 ${x.kcal} kcal p.p.</span> <span>💪 ${x.p}g eiwit</span> <span>🕒 ${x.t} minuten kooktijd</span>`;
        
        if(x.ing) {
            document.getElementById('mIng').innerHTML = x.ing.map(i => `<li>${i}</li>`).join('');
        }
        
        // Verwijder de "1. ", "2. " uit de array zodat we de CSS teller kunnen gebruiken
        if(x.steps) {
            document.getElementById('mSteps').innerHTML = x.steps.map(s => {
                let cleanStep = s.replace(/^\d+\.\s*/, ''); 
                return `<p>${cleanStep}</p>`;
            }).join('');
        }
        
        const kidEl = document.getElementById('mKid');
        kidEl.style.display = x.kid ? 'block' : 'none';
        kidEl.innerHTML = x.kid ? `<b>👶 Kind-Tip:</b> ${x.kid}` : '';
        document.getElementById('receptModal').style.display = 'block';
    }

    function closeModal() { document.getElementById('receptModal').style.display = 'none'; }
    window.onclick = (e) => { if(e.target.className === 'modal') closeModal(); }
    
    // START SCRIPT MET SMART DATE
    window.onload = initSmartDate;
</script>
</body>
</html>
